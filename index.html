<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Northn Software — Direção inteligente. Resultados reais.</title>
<meta name="description" content="Northn Software: Menu, Stock, Forms, RH, Finance e BI — uma suíte de produtos para operações que querem crescer com clareza.">
<link rel="icon" type="image/svg+xml" href="assets/logo.svg">
<link rel="alternate icon" href="assets/logo.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;650;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="https://api.fontshare.com/v2/css?f[]=clash-display@500,600,700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">
</head>
<body>

<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <defs>
    <linearGradient id="northnGrad" x1="4%" y1="2%" x2="96%" y2="98%">
      <stop offset="0%" stop-color="#a396ff"/>
      <stop offset="55%" stop-color="#7c6ae8"/>
      <stop offset="100%" stop-color="#4b3bc4"/>
    </linearGradient>
  </defs>
</svg>

<div class="ambient"><div class="grain"></div></div>

<div class="topbar" id="topbar">
  <a href="#" class="topbar-inner">
    <svg class="northn-mark" viewBox="0 0 70 62" aria-label="Northn">
      <path fill="url(#northnGrad)" d="M38.6,4.1 L31.5,4.0 L4.0,52.5 L6.3,57.8 L14.8,56.6 L39.9,11.4 Z"/>
      <path fill="url(#northnGrad)" d="M41.3,16.1 L38.0,21.5 L37.9,26.1 L55.0,57.6 L62.6,57.8 L65.0,52.8 L44.6,16.0 Z"/>
      <path fill="url(#northnGrad)" d="M21.9,56.1 L23.8,58.0 L45.1,58.0 L47.7,54.4 L44.4,48.0 L26.8,46.9 L24.1,49.3 Z"/>
    </svg>
    <span class="topbar-word"><b>NORTHN</b> SOFTWARE</span>
  </a>
  <div class="theme-toggle" id="themeToggle" data-pos="0">
    <div class="thumb"></div>
    <button type="button" data-theme-btn="dark" aria-label="Tema escuro" title="Tema escuro"></button>
    <button type="button" data-theme-btn="light" aria-label="Tema claro" title="Tema claro"></button>
  </div>
</div>

<div class="stage">
  <div class="view" id="view-home"></div>
  <div class="view" id="view-detail"></div>
</div>

<script src="js/app.js"></script>
</body>
</html>
